<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial;
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 8px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        background: #4f46e5;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #3730a3;
    }

    #result {
        margin-top: 20px;
        color: #111827;
    }
</style>

<body>

    <div class="container">

        <h1>Astrology Prediction</h1>

        <form id="astroForm">

            <label>Name</label>
            <input type="text" id="name" required>

            <label>Date of Birth</label>
            <input type="date" id="dob" required>


            <label>Place of Birth</label>
            <input type="text" id="place" required>

            <button type="submit">Get Prediction</button>

        </form>

        <h2 id="result"></h2>

    </div>

    <script src="file.js"></script>

</body>

</html>

</body>

</html>
