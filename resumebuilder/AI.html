<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Simple Resume Builder</title>

  <!-- PDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Simple Resume Builder</h1>

  <div class="container">

    <!-- FORM -->
    <div class="form-section">
      <input type="text" id="name" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email">
      <input type="text" id="phone" placeholder="Phone">
      <input type="text" id="designation" placeholder="Designation">
      <input type="text" id="skills" placeholder="Skills (comma separated)">
      <textarea id="education" placeholder="Education"></textarea>
      <textarea id="experience" placeholder="Experience"></textarea>
      <input type="text" id="hobbies" placeholder="Hobbies">

      <button onclick="generateResume()">Generate Resume</button>
      <button onclick="downloadPDF()">Download PDF</button>
    </div>

    <!-- PREVIEW -->
    <div class="preview-section">
      <div id="resume"></div>
    </div>

  </div>
<script src="AIjs.js"></script>

</body>

</html>
